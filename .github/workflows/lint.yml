name: Ruff

on:
    push:
        paths: ["**.py"]
    pull_request:
        paths: ["**.py"]

jobs:
    ruff:
        name: Run Ruff
        runs-on: ubuntu-latest

        steps:
        -   uses: actions/checkout@v4

        -   name: Set up Python
            uses: actions/setup-python@v5
            with:
                python-version: "3.12"

        -   name: Install Ruff
            run: pip install ruff==0.12.1

        -   name: Check formatting
            run: ruff format --check .

        -   name: Lint
            run: ruff check .
